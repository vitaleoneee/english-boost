{% extends "base.html" %}
{% load crispy_forms_tags i18n %}

{% block title %}{% trans "Add word" %}{% endblock title %}

{% block content %}
    <div class="container mt-5">
        <h1 class="text-center mb-4">{% trans "Add a new word to the dictionary" %}</h1>
        <div class="card new-word-card shadow-sm mx-auto">
            <div class="card-body">
                <form method="POST" novalidate>
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="text-center">
                        <button type="submit" class="btn btn-success px-4">{% trans "Add" %}</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
{% endblock content %}
